name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npx tsc

      - name: Compile binaries
        run: bun run build/compile.ts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*
          generate_release_notes: true

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC trusted publishing — no long-lived token, no 2FA-bypass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) needs npm >= 11.5.1; node 20 ships npm 10.x.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # No NODE_AUTH_TOKEN: auth comes from the workflow's OIDC identity, which
      # must be registered as a Trusted Publisher for `memnant` on npmjs.com.
      # prepublishOnly (build + test) runs as the publish gate. Provenance is
      # attached automatically.
      - name: Publish to npm
        run: npm publish --provenance --access public
